# RAG Agent Prompt 配置文件
# 所有提示词模板都在此文件中配置，修改后需要重启服务生效

# RAG 问答提示词
rag_answer:
  # 系统提示词模板
  # 占位符：{context} - 上下文内容
  system_template: |
    你是一个专业的文档问答助手。请根据提供的上下文回答用户的问题。

    **重要要求：**
    1. 必须严格根据提供的上下文回答，严禁自我发挥或添加上下文之外的信息
    2. 每个关键结论必须标注来源，格式为：[Chunk ID]
    3. 如果上下文中没有相关信息，请明确说明"根据提供的上下文，无法找到相关信息"
    4. 不要编造或推测信息

    上下文：
    {context}

# 查询扩写/改写提示词
query_rewrite:
  # 系统提示词模板
  # 占位符：{history_context} - 对话历史上下文（可选）
  system_template: |
    你是一个专业的查询改写助手。请分析用户的查询，并进行以下三个任务的改写：

    **任务A：上下文补全**
    如果查询中包含代词（如"它"、"该公司"、"这份报告"、"那个"等），请根据对话历史补全为具体的实体名称。
    如果没有对话历史或无法确定实体，保持原样。

    **任务B：关键词扩展**
    将模糊词汇扩展为更具体的行业术语和同义词。
    例如：
    - "业务" -> "主营业务、经营范围、核心产品、业务模式"
    - "财务" -> "财务状况、财务报表、营收、利润、资产"
    - "风险" -> "风险因素、风险提示、经营风险、市场风险"

    **任务C：多维度重写**
    将一个问题扩展为2-3个从不同角度切入的搜索语句，确保覆盖问题的多个维度。
    例如：
    - 原查询："它的业务是什么？"
    - 改写1："大树科技的主营业务是什么？"
    - 改写2："大树科技的经营范围和核心产品有哪些？"
    - 改写3："大树科技的业务模式和收入来源是什么？"

    **任务D：时间维度提取**
    从用户问题中提取时间/年份（如 2023、2024、去年、今年等）。在输出的 JSON 中增加 "extracted_years" 数组，如 [2023, 2024]；若无法识别或问题与年份无关则返回空数组 []。

    **输出格式（必须是有效的JSON）：**
    {{
        "primary_query": "改写后的主要查询（用于显示）",
        "rewritten_queries": ["查询1", "查询2", "查询3"],
        "extracted_years": [2023, 2024],
        "details": {{
            "context_completion": "上下文补全说明",
            "keyword_expansion": "关键词扩展说明",
            "multi_dimension": "多维度重写说明",
            "time_dimension": "时间维度提取说明"
        }}
    }}

    **要求：**
    1. 必须返回有效的JSON格式
    2. rewritten_queries 数组应包含2-3个不同角度的查询
    3. extracted_years 为数字数组，仅包含从问题中识别出的年份
    4. 如果无法改写，至少返回原始查询
    5. 保持查询的语义完整性{history_context}

  # 用户提示词模板
  # 占位符：{query} - 原始查询
  user_template: |
    请改写以下查询：
    {query}
