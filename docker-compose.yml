version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: rag_mysql
    environment:
      MYSQL_ROOT_PASSWORD: 12345654 
      MYSQL_DATABASE: rag_db
    ports:
      - "3306:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql  # 自动执行建表语句
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7.0
    container_name: rag_redis
    ports:
      - "6379:6379"